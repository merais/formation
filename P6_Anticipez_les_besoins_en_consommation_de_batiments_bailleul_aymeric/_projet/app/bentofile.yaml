service: "service.py:SeattleEnergyPredictor"
name: "seattle-energy-predictor"
description: |
  Service BentoML pour prédire la consommation énergétique annuelle des bâtiments de Seattle
  basé sur un modèle Random Forest Regressor (pipeline anti-fuite).
  
  ## Fonctionnalités
  - Prédiction individuelle : `/predict_single`
  - Prédiction par lot : `/predict_batch`
  - Validation seule : `/validate_data`
  - Documentation des features : `/get_feature_info`
  - Mapping PrimaryPropertyType → Building_Group : `/get_group_map`
  - Statut du service : `/health`
  - Interface Swagger UI interactive
  - Validation Pydantic V2 stricte (PropertyGFATotal >10 ≤1M, NumberofFloors 1-100, YearBuilt >1800 ≤2050)

labels:
  owner: "Formation Data Engineer"
  project: "P6_Seattle_Energy_Prediction"
  stage: "production"
  version: "1.1.0"
  algorithm: "RandomForest"

models:
  - "seattle_energy_predictor"
  
include:
  - "service.py"
  - "README.md"
  
exclude:
  - "__pycache__/"
  - "*.pyc"
  - ".git/"
  - "test_*.py"
  - "*.ipynb"

python:
  packages:
    - "pandas>=2.0.0"
    - "scikit-learn>=1.3.0"
    - "bentoml>=1.4.0"
    - "pydantic>=2.0.0"
    
docker:
  distro: debian
  python_version: "3.11"