services:
  # Service MongoDB
  mongodb:
    image: mongo:latest
    container_name: healthcare_mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: healthcare_db
    volumes:
      # Volume pour la persistance des données MongoDB
      - mongodb_data:/data/db
      # Volume pour accéder au fichier CSV depuis le conteneur
      - ./sources:/app/sources:ro
      # Scripts d'initialisation (création de la collection patients)
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    networks:
      - healthcare_network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Service pour exécuter le script d'import (à la demande)
  import_scripts:
    build:
      context: .
      dockerfile: Dockerfile.import_scripts
    container_name: healthcare_import
    depends_on:
      - mongodb
    environment:
      # URI de connexion MongoDB et nom de la base de données
      MONGODB_URI: mongodb://mongodb:27017/
      MONGODB_DB: healthcare_db
    networks:
      - healthcare_network
    # Le profil permet d'exécuter ce service seulement à la demande
    profiles:
      - import

  # Service de tests automatisés (pytest)
  tests:
    build:
      context: .
      dockerfile: Dockerfile.tests
    container_name: healthcare_tests
    working_dir: /app
    environment:
      MONGODB_URI: mongodb://mongodb:27017/
      MONGODB_DB: healthcare_db
      COLLECTION_NAME: patients
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - healthcare_network

# Volumes nommés
volumes:
  mongodb_data:
    driver: local

# Réseau dédié
networks:
  healthcare_network:
    driver: bridge
